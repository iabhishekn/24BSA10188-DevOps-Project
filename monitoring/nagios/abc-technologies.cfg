define host {
    use                     linux-server
    host_name               abc-technologies-website
    alias                   ABC Technologies Corporate Website
    address                 127.0.0.1
    check_command           check-host-alive
    max_check_attempts      3
    check_interval          5
    retry_interval          1
}

define service {
    use                     generic-service
    host_name               abc-technologies-website
    service_description     HTTP Service
    check_command           check_http!-p 8080 -u /
    max_check_attempts      3
    check_interval          5
    retry_interval          1
}

define service {
    use                     generic-service
    host_name               abc-technologies-website
    service_description     HTTP Careers Page
    check_command           check_http!-p 8080 -u /careers.html
    max_check_attempts      3
    check_interval          10
    retry_interval          2
}
